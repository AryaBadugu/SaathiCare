<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - SaathiCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top left, #fee2e2 0%, #fff 50%, #fef3c7 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 25px 50px -12px rgba(219, 39, 119, 0.1); }
        .premium-input { background: rgba(255, 255, 255, 0.9); border: 2px solid transparent; transition: all 0.3s ease; }
        .premium-input:focus { border-color: #ec4899; box-shadow: 0 0 15px rgba(236, 72, 153, 0.15); background: white; }
    </style>
</head>
<body class="flex flex-col">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-white/30">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-gray-800">🌱Saathi<span class="text-pink-600">Care</span></a>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-sm font-semibold text-gray-600 hover:text-pink-600 transition">Home</a>
                <a href="about.html" class="text-sm font-semibold text-gray-600 hover:text-pink-600 transition">About</a>
                <a href="contact.html" class="text-sm font-semibold text-pink-600 transition">Contact</a>
                <a href="donororngo.html" class="bg-pink-600 text-white px-6 py-2 rounded-full text-xs font-bold hover:bg-pink-700 transition">Get Started</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-20 px-6">
        <div class="container mx-auto max-w-5xl">
            <div class="glass-card rounded-[3rem] overflow-hidden flex flex-col md:flex-row">
                <div class="bg-pink-600 p-12 text-white md:w-2/5 flex flex-col justify-between">
                    <div>
                        <h1 class="text-4xl font-bold mb-6">Let's Talk</h1>
                        <p class="text-pink-100 font-light leading-relaxed">Have questions or want to partner with us? Our team is here to support you in your journey of giving.</p>
                    </div>
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <i class="far fa-envelope text-xl"></i>
                            <span class="text-sm">atharvadhenge714@gmail.com</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <i class="fas fa-phone-alt text-xl"></i>
                            <span class="text-sm">7710869774</span>
                        </div>
                    </div>
                </div>

                <div class="p-12 md:w-3/5">
                    <form action="https://formspree.io/f/mqewvroz" method="POST" id="contact-form" class="space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Name</label>
                                <input id="name" name="name" type="text" placeholder="John Doe" class="premium-input w-full p-4 rounded-2xl text-sm" required />
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Email</label>
                                <input id="email" name="email" type="email" placeholder="john@example.com" class="premium-input w-full p-4 rounded-2xl text-sm" required />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Subject</label>
                            <input id="subject" name="subject" type="text" placeholder="How can we help?" class="premium-input w-full p-4 rounded-2xl text-sm" required />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Message</label>
                            <textarea id="message" name="message" rows="4" placeholder="Tell us more about your inquiry..." class="premium-input w-full p-4 rounded-2xl text-sm" required></textarea>
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-pink-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-700 transition">Send Message</button>
                    </form>
                    <div id="success-message" class="hidden mt-6 p-4 bg-green-50 text-green-700 rounded-2xl flex items-center gap-3">
                        <i class="fas fa-check-circle"></i>
                        <span class="text-sm">Authorized person will be in touch shortly.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-10 mt-auto">
        <div class="container mx-auto px-6 text-center text-gray-400 text-xs">
            <p>&copy; 2024 SaathiCare Foundation. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://ceorbsqwabgioxfcrqvv.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlb3Jic3F3YWJnaW94ZmNycXZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkzNDQ3OTMsImV4cCI6MjA3NDkyMDc5M30.rcmIGUIg1jeTXu0n6lc5Kpz3BLwmIzm2aOW4V6alOlU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Sending...';

            const form = e.target;
            const data = new FormData(form);

            try {
                // 1. Submit to Formspree
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                // 2. Also save to Supabase for record keeping
                const formData = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    subject: document.getElementById('subject').value,
                    message: document.getElementById('message').value,
                    created_at: new Date().toISOString()
                };
                await supabase.from('contact_messages').insert([formData]);

                if (response.ok) {
                    document.getElementById('success-message').classList.remove('hidden');
                    form.reset();
                } else {
                    throw new Error('Form submission failed.');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
